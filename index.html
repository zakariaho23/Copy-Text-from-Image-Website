<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Text from Image</title>
    <!-- Tesseract.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.1/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="file"] {
            margin-bottom: 16px;
        }
        select, button {
            margin-bottom: 16px;
            padding: 8px;
            font-size: 1em;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 16px;
            padding: 8px;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid #ccc;
            resize: vertical;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .actions button {
            flex: 1;
        }
        #status {
            color: #007bff;
            margin-bottom: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Copy Text from Image</h2>
        <label for="imageInput">Upload Image (JPG, PNG):</label>
        <input type="file" id="imageInput" accept="image/png, image/jpeg">

        <label for="langSelect">Select Language:</label>
        <select id="langSelect">
            <option value="eng">English</option>
            <option value="tur">Turkish</option>
            <option value="ara">Arabic</option>
            <option value="chi_sim">Chinese (Simplified)</option>
        </select>

        <div class="actions">
            <button id="extractBtn">Extract Text</button>
            <button id="copyBtn">Copy Text</button>
        </div>
        <div id="status"></div>
        <textarea id="resultText" placeholder="Extracted text will appear here..."></textarea>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const extractBtn = document.getElementById('extractBtn');
        const copyBtn = document.getElementById('copyBtn');
        const resultText = document.getElementById('resultText');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');

        extractBtn.onclick = async () => {
            if (!imageInput.files[0]) {
                status.textContent = 'Please upload an image.';
                return;
            }
            status.textContent = 'Processing...';
            resultText.value = '';
            const file = imageInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                const imageData = e.target.result;
                try {
                    const { data: { text } } = await Tesseract.recognize(
                        imageData,
                        langSelect.value,
                        {
                            logger: m => status.textContent = m.status + (m.progress ? ` (${Math.round(m.progress*100)}%)` : '')
                        }
                    );
                    resultText.value = text;
                    status.textContent = 'Done!';
                } catch (err) {
                    status.textContent = 'Error: ' + err.message;
                }
            };
            reader.readAsDataURL(file);
        };

        copyBtn.onclick = () => {
            resultText.select();
            document.execCommand('copy');
            status.textContent = 'Text copied to clipboard!';
        };
    </script>
</body>
</html>
